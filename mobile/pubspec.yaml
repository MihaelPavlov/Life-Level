name: life_level
description: Gamified fitness tracker — train in the real world, progress in a game world.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.7.0
  retrofit: ^4.4.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Secure storage (JWT token)
  flutter_secure_storage: ^9.2.2

  # UI helpers
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.3

  # Fitness integrations
  health: ^11.0.0
  shared_preferences: ^2.3.0
  flutter_web_auth_2: ^4.0.0

  # Deep links
  app_links: ^6.3.2

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.7
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  retrofit_generator: ^9.1.5
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
